name: Send Timetable

on:
  schedule:
    - cron: '0 11 * * 1-5'  # Every weekday at 6am UTC

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python timetable.py
